services:
  - type: web
    name: resume-analyzer-backend
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        value: sqlite:./database.sqlite  # Replace with Render PostgreSQL URL for persistent storage
      - key: JWT_SECRET
        sync: false  # Set this in Render dashboard → Environment
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: GEMINI_API_KEY
        sync: false  # Set this in Render dashboard → Environment
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel deployment URL e.g. https://your-app.vercel.app
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: UPLOAD_DIR
        value: ./uploads
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOG_LEVEL
        value: info
